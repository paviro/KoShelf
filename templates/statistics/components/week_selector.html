<!-- Week Selector -->
<div class="relative">
    <div
        id="weekSelectorWrapper"
        class="dropdown-trigger flex items-center justify-center sm:justify-between bg-gray-100/50 dark:bg-dark-800/50 border border-gray-300/50 dark:border-dark-700/50 rounded-lg w-10 sm:w-auto sm:px-4 h-10 cursor-pointer hover:bg-gray-200/50 dark:hover:bg-dark-700/50 transition-all duration-200 text-sm md:text-base backdrop-blur-sm"
    >
        <div class="flex items-center space-x-0 sm:space-x-3 min-w-0">
            <svg
                class="w-5 h-5 text-gray-600 dark:text-gray-300 sm:text-primary-400 sm:dark:text-primary-400"
                fill="none"
                stroke="currentColor"
                viewBox="0 0 24 24"
            >
                <path
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    stroke-width="2"
                    d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"
                ></path>
            </svg>
            <span
                id="selectedWeekText"
                class="hidden sm:inline text-gray-900 dark:text-white font-medium text-sm truncate"
            >
                {% if reading_stats.weeks.len() > 0 %}
                <span class="font-bold"></span> <span class="text-primary-400"></span>
                {% else %} No weeks available {% endif %}
            </span>
        </div>
        <svg
            id="dropdownArrow"
            class="hidden sm:block w-4 h-4 text-gray-400 dark:text-dark-400 transition-transform duration-200 ml-2"
            fill="none"
            stroke="currentColor"
            viewBox="0 0 24 24"
        >
            <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M19 9l-7 7-7-7"
            ></path>
        </svg>
    </div>

    <!-- Dropdown Options -->
    <div
        id="weekOptions"
        class="dropdown-menu-right z-30 bg-white dark:bg-dark-800/75 border border-gray-200/50 dark:border-dark-700/50 rounded-lg shadow-xl hidden w-56 sm:w-64 max-w-[calc(100vw-1rem)] overflow-hidden backdrop-blur-md"
    >
        <div id="weekYearList" class="max-h-56 overflow-y-auto"></div>

        <div id="weekYearWeeksView" class="hidden">
            <div
                class="flex items-center justify-between px-3 py-2 border-b border-gray-200/60 dark:border-dark-700/60 bg-gray-50/70 dark:bg-dark-900/40"
            >
                <button
                    id="weekYearBackButton"
                    type="button"
                    class="inline-flex items-center justify-center w-8 h-8 rounded-md text-gray-500 dark:text-dark-300 hover:bg-gray-200/70 dark:hover:bg-dark-700/70 transition-colors duration-200"
                    aria-label="Back to years"
                >
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path
                            stroke-linecap="round"
                            stroke-linejoin="round"
                            stroke-width="2"
                            d="M15 19l-7-7 7-7"
                        ></path>
                    </svg>
                </button>
                <span
                    id="weekYearTitle"
                    class="text-sm font-semibold text-gray-900 dark:text-white"
                ></span>
                <span class="w-8 h-8"></span>
            </div>

            <div id="weekYearWeekList" class="max-h-56 overflow-y-auto">
                {% for (index, week) in reading_stats.weeks.iter().enumerate() %}
                <div
                    class="week-option px-4 py-2.5 cursor-pointer hover:bg-gray-100/60 dark:hover:bg-dark-700/60 text-gray-600 dark:text-dark-200 hover:text-gray-900 dark:hover:text-white transition-colors duration-200 {% if index == 0 %}bg-primary-50 dark:bg-dark-700 text-primary-900 dark:text-white{% endif %}"
                    data-week-index="{{ index }}"
                    data-start-date="{{ week.start_date }}"
                    data-end-date="{{ week.end_date }}"
                    data-week-year="{{ week.start_date.chars().take(4).collect::<String>() }}"
                >
                    <div class="flex items-center">
                        <svg
                            class="w-4 h-4 text-primary-400 mr-2 flex-shrink-0"
                            fill="none"
                            stroke="currentColor"
                            viewBox="0 0 24 24"
                        >
                            <path
                                stroke-linecap="round"
                                stroke-linejoin="round"
                                stroke-width="2"
                                d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"
                            ></path>
                        </svg>
                        <span class="week-date-display"></span>
                    </div>
                </div>
                {% endfor %}
            </div>
        </div>
    </div>
</div>
