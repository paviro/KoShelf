# Combined packaging tasks
[tasks.package-all]
description = "Package all platform binaries into zip files"
dependencies = [
    "package-arm64-musl",
    "package-arm64-gnu",
    "package-x86-gnu", 
    "package-x86-musl",
    "package-i686-gnu",
    "package-i686-musl",
    "package-armv7-gnu",
    "package-armv7-musl",
    "package-riscv64-gnu",
    "package-riscv64-musl",
