# Multi-target build tasks for koshelf

[config]
default_to_workspace = false
main_project_member = "."

# Default environment variables
[env]
CARGO_BUILD_PROFILE = "release"
CARGO_TARGET_AARCH64_UNKNOWN_LINUX_MUSL_LINKER = "aarch64-unknown-linux-musl-gcc"
CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER = "aarch64-linux-gnu-gcc"
CARGO_TARGET_X86_64_UNKNOWN_LINUX_GNU_LINKER = "x86_64-linux-gnu-gcc"
CARGO_TARGET_X86_64_UNKNOWN_LINUX_MUSL_LINKER = "x86_64-unknown-linux-musl-gcc"
CARGO_TARGET_I686_UNKNOWN_LINUX_GNU_LINKER = "i686-unknown-linux-gnu-gcc"
CARGO_TARGET_I686_UNKNOWN_LINUX_MUSL_LINKER = "i686-unknown-linux-musl-gcc"
CARGO_TARGET_ARMV7_UNKNOWN_LINUX_GNUEABIHF_LINKER = "armv7-unknown-linux-gnueabihf-gcc"
CARGO_TARGET_ARMV7_UNKNOWN_LINUX_MUSLEABIHF_LINKER = "armv7-unknown-linux-musleabihf-gcc"
CARGO_TARGET_X86_64_PC_WINDOWS_GNU_LINKER = "x86_64-w64-mingw32-gcc"
CC_aarch64_unknown_linux_musl = "aarch64-unknown-linux-musl-gcc"
CXX_aarch64_unknown_linux_musl = "aarch64-unknown-linux-musl-g++"
CC_aarch64_unknown_linux_gnu = "aarch64-linux-gnu-gcc"
CXX_aarch64_unknown_linux_gnu = "aarch64-linux-gnu-g++"
CC_x86_64_unknown_linux_gnu = "x86_64-linux-gnu-gcc"
CXX_x86_64_unknown_linux_gnu = "x86_64-linux-gnu-g++"
CC_x86_64_unknown_linux_musl = "x86_64-unknown-linux-musl-gcc"
CXX_x86_64_unknown_linux_musl = "x86_64-unknown-linux-musl-g++"
CC_i686_unknown_linux_gnu = "i686-unknown-linux-gnu-gcc"
CXX_i686_unknown_linux_gnu = "i686-unknown-linux-gnu-g++"
CC_i686_unknown_linux_musl = "i686-unknown-linux-musl-gcc"
CXX_i686_unknown_linux_musl = "i686-unknown-linux-musl-g++"
CC_armv7_unknown_linux_gnueabihf = "armv7-unknown-linux-gnueabihf-gcc"
CXX_armv7_unknown_linux_gnueabihf = "armv7-unknown-linux-gnueabihf-g++"
CC_armv7_unknown_linux_musleabihf = "armv7-unknown-linux-musleabihf-gcc"
CXX_armv7_unknown_linux_musleabihf = "armv7-unknown-linux-musleabihf-g++"
# The aarch64 FreeBSD slice is Tier 3 (no rustup std); this nightly must match
# the pin in .github/workflows/release.yml.
FREEBSD_NIGHTLY = "nightly-2026-07-15"

# Production profile environment
[env.production]
CARGO_BUILD_PROFILE = "release"

# ARM64 targets
[tasks.build-arm64-musl]
description = "Build for ARM64 with musl"
command = "cargo"
args = ["build", "--release", "--locked", "--target", "aarch64-unknown-linux-musl"]

[tasks.build-arm64-gnu]
description = "Build for ARM64 with glibc"
command = "cargo"
args = ["build", "--release", "--locked", "--target", "aarch64-unknown-linux-gnu"]

# x86_64 Linux targets
[tasks.build-x86-gnu]
description = "Build for x86_64 Linux with glibc"
command = "cargo"
args = ["build", "--release", "--locked", "--target", "x86_64-unknown-linux-gnu"]

[tasks.build-x86-musl]
description = "Build for x86_64 Linux with musl"
command = "cargo"
args = ["build", "--release", "--locked", "--target", "x86_64-unknown-linux-musl"]

# 32-bit x86 Linux targets
[tasks.build-i686-gnu]
description = "Build for 32-bit x86 Linux with glibc"
command = "cargo"
args = ["build", "--release", "--locked", "--target", "i686-unknown-linux-gnu"]

[tasks.build-i686-musl]
description = "Build for 32-bit x86 Linux with musl"
command = "cargo"
args = ["build", "--release", "--locked", "--target", "i686-unknown-linux-musl"]

# 32-bit ARMv7 Linux targets (hard-float)
[tasks.build-armv7-gnu]
description = "Build for 32-bit ARMv7 Linux with glibc (hard-float)"
command = "cargo"
args = ["build", "--release", "--locked", "--target", "armv7-unknown-linux-gnueabihf"]

[tasks.build-armv7-musl]
description = "Build for 32-bit ARMv7 Linux with musl (hard-float)"
command = "cargo"
args = ["build", "--release", "--locked", "--target", "armv7-unknown-linux-musleabihf"]

# 64-bit RISC-V Linux targets. No riscv64 cross gcc ships via Homebrew, so
# these cross-compile with cargo-zigbuild (zig supplies libc and the linker).
# Mainline LuaJIT has no riscv64 backend; mlua builds vendored PUC Lua 5.1 on
# this arch instead (see Cargo.toml).
[tasks.build-riscv64-gnu]
description = "Cross-compile for riscv64 Linux with glibc 2.27+ (cargo-zigbuild)"
command = "cargo"
args = [
    "zigbuild",
    "--release",
    "--locked",
    "--target",
    "riscv64gc-unknown-linux-gnu.2.27",
]

[tasks.build-riscv64-musl]
description = "Cross-compile for riscv64 Linux with musl (cargo-zigbuild)"
command = "cargo"
args = [
    "zigbuild",
    "--release",
    "--locked",
    "--target",
    "riscv64gc-unknown-linux-musl",
]
# riscv64 musl is a newer target that defaults to dynamic linking, unlike the
# older musl targets; force the static binary the musl artifacts promise.
env = { CARGO_TARGET_RISCV64GC_UNKNOWN_LINUX_MUSL_RUSTFLAGS = "-C target-feature=+crt-static" }

# FreeBSD targets, cross-compiled with cargo-zigbuild: zig ships the
# FreeBSD 14+ libc stubs and headers, so no BSD host is needed. TARGET_LIBS
# and TARGET_STRIP configure the vendored LuaJIT build as in release.yml;
# the CXXFLAGS define selects unrar's scalar fallback because zig omits the
# __cpu_model runtime its optional x86 dispatch uses.
#
# TARGET_SYS steers only LuaJIT's host-side buildvm: without it the Makefile
# assumes the macOS host and demands MACOSX_DEPLOYMENT_TARGET. "Linux" gives
# buildvm the POSIX ELF defines — the same thing the Linux CI runners produce
# by default — while the FreeBSD target code detects its OS from __FreeBSD__
# in zig's headers. ("FreeBSD" is not a value LuaJIT's Makefile knows; it
# would map to the non-POSIX LUAJIT_OS_OTHER and drop POSIX library defs.)
[tasks.build-freebsd-x86]
description = "Cross-compile for x86_64 FreeBSD 14+ (cargo-zigbuild)"
command = "cargo"
args = ["zigbuild", "--release", "--locked", "--target", "x86_64-unknown-freebsd"]
env = { CXXFLAGS = "-D__builtin_cpu_supports(x)=0", TARGET_LIBS = "-lunwind", TARGET_STRIP = "true", TARGET_SYS = "Linux" }

# Cargo-make would try to install the target for a `+toolchain` argument, so
# the nightly is selected via RUSTUP_TOOLCHAIN instead. Install it first:
#   rustup toolchain install nightly-2026-07-15 --component rust-src
[tasks.build-freebsd-arm64]
description = "Cross-compile for aarch64 FreeBSD 14+ (Tier 3, nightly + build-std)"
command = "cargo"
args = [
    "zigbuild",
    "--release",
    "--locked",
    "--target",
    "aarch64-unknown-freebsd",
    "-Z",
    "build-std=std,panic_abort",
]
env = { RUSTUP_TOOLCHAIN = "${FREEBSD_NIGHTLY}", TARGET_LIBS = "-lunwind", TARGET_STRIP = "true", TARGET_SYS = "Linux" }

# Windows targets
[tasks.build-windows-gnu]
description = "Build for Windows x86_64 (MinGW)"
command = "cargo"
args = ["build", "--release", "--locked", "--target", "x86_64-pc-windows-gnu"]

# macOS targets
[tasks.build-macos-intel]
description = "Build for Intel macOS 10.12 and newer"
command = "cargo"
args = ["build", "--release", "--locked", "--target", "x86_64-apple-darwin"]
env = { MACOSX_DEPLOYMENT_TARGET = "10.12" }
env_files = ["./.env"]

[tasks.build-macos-silicon]
description = "Build for Apple Silicon macOS 11 and newer"
command = "cargo"
args = ["build", "--release", "--locked", "--target", "aarch64-apple-darwin"]
env = { MACOSX_DEPLOYMENT_TARGET = "11.0" }
env_files = ["./.env"]

[tasks.build-macos-universal]
description = "Build universal macOS binary (Intel + Apple Silicon)"
dependencies = ["build-macos-intel", "build-macos-silicon"]
script = '''
mkdir -p target/universal-apple-darwin/release
lipo -create \
    target/x86_64-apple-darwin/release/koshelf \
    target/aarch64-apple-darwin/release/koshelf \
    -output target/universal-apple-darwin/release/koshelf
'''

# Combined build tasks
[tasks.build-all]
description = "Build for all supported platforms"
dependencies = [
    "build-arm64-musl",
    "build-arm64-gnu",
    "build-x86-gnu",
    "build-x86-musl",
    "build-i686-gnu",
    "build-i686-musl",
    "build-armv7-gnu",
    "build-armv7-musl",
    "build-riscv64-gnu",
    "build-riscv64-musl",
    "build-freebsd-x86",
    "build-freebsd-arm64",
    "build-windows-gnu",
    "build-macos-intel",
    "build-macos-silicon",
    "build-macos-universal"
]

[tasks.build-arm64-all]
description = "Build for both ARM64 targets"
dependencies = [
    "build-arm64-musl", 
    "build-arm64-gnu"
]

[tasks.build-linux-all]
description = "Build for all Linux targets"
dependencies = [
    "build-arm64-musl",
    "build-arm64-gnu",
    "build-x86-gnu",
    "build-x86-musl",
    "build-i686-gnu",
    "build-i686-musl",
    "build-armv7-gnu",
    "build-armv7-musl",
    "build-riscv64-gnu",
    "build-riscv64-musl"
]

[tasks.build-windows-all]
description = "Build for all Windows targets"
dependencies = [
    "build-windows-gnu"
]

[tasks.build-macos-all]
description = "Build for all macOS targets"
dependencies = [
    "build-macos-intel",
    "build-macos-silicon", 
    "build-macos-universal"
]

[tasks.run-tests]
description = "Execute the full test suite before building releases"
command = "cargo"
args = ["test", "--locked"]

[tasks.clean-all]
description = "Clean all build artifacts"
command = "cargo"
args = ["clean"]

# Packaging tasks
[tasks.create-release-dir]
description = "Create release directory"
script = '''
mkdir -p release
'''


[tasks.package-arm64-musl]
description = "Package ARM64 musl binary"
dependencies = ["create-release-dir"]
script = '''
BINARY_NAME="koshelf"
TARGET="aarch64-unknown-linux-musl"
PLATFORM="linux-musl-aarch64"
cp "target/${TARGET}/release/${BINARY_NAME}" "release/"
cd release
zip "${PLATFORM}.zip" "${BINARY_NAME}"
rm "${BINARY_NAME}"
'''

[tasks.package-arm64-gnu]
