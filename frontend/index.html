<!doctype html>
<html lang="en" class="h-full">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>KoShelf</title>
        <link rel="manifest" href="/manifest.json" />
        <meta name="theme-color" content="#6366f1" />
        <meta name="mobile-web-app-capable" content="yes" />
        <meta name="apple-mobile-web-app-capable" content="yes" />
        <meta
            name="apple-mobile-web-app-status-bar-style"
            content="black-translucent"
        />
        <script>
            (() => {
                const STORAGE_KEY = 'koshelf_theme_preference';
                const DARK_QUERY = '(prefers-color-scheme: dark)';

                try {
                    const rawValue = localStorage.getItem(STORAGE_KEY);
                    const parsedValue =
                        rawValue === null ? null : JSON.parse(rawValue);
                    const preference =
                        parsedValue === 'light' ||
                        parsedValue === 'dark' ||
                        parsedValue === 'auto'
                            ? parsedValue
                            : 'auto';
                    const useDark =
                        preference === 'dark' ||
                        (preference === 'auto' &&
                            window.matchMedia &&
                            window.matchMedia(DARK_QUERY).matches);

                    document.documentElement.classList.toggle('dark', useDark);
                    document.documentElement.style.colorScheme = useDark
                        ? 'dark'
                        : 'light';
                } catch {
                    // Ignore storage and media query failures.
                }
            })();
        </script>
    </head>
    <body
        class="min-h-full bg-gray-100 dark:bg-dark-925 text-gray-900 dark:text-white font-sans"
    >
        <div id="root"></div>
        <script type="module" src="/src/main.tsx"></script>
    </body>
</html>
