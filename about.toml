# cargo-about configuration for third-party license generation.
# Run: cargo about generate about.hbs

accepted = [
    "0BSD",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-1-Clause",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "BSL-1.0",
    "CC0-1.0",
    "CDLA-Permissive-2.0",
    "EUPL-1.2",
    "ISC",
    "LGPL-2.1-or-later",
    "MIT",
    "MIT-0",
    "MPL-2.0",
    "OFL-1.1",
    "Unlicense",
    "Unicode-3.0",
    "Zlib",
    "bzip2-1.0.6",
]

ignore-build-dependencies = true
ignore-dev-dependencies = true
filter-noassertion = true

# libbz2-rs-sys: non-SPDX "bzip2-1.0.6" license identifier
[libbz2-rs-sys.clarify]
license = "bzip2-1.0.6"

[[libbz2-rs-sys.clarify.files]]
path = "LICENSE"
checksum = "54e1fd7bd53273e601c9599eb162a004dacddee031ae297ee7109a7beb93b1c2"
license = "bzip2-1.0.6"
