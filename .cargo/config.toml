[target.aarch64-unknown-linux-musl]
linker = "aarch64-unknown-linux-musl-gcc"
rustflags = ["-Clink-arg=-lgcc"]

[target.aarch64-unknown-linux-gnu]
linker = "aarch64-linux-gnu-gcc"

[target.x86_64-unknown-linux-gnu]
linker = "x86_64-linux-gnu-gcc"

[target.x86_64-unknown-linux-musl]
linker = "x86_64-unknown-linux-musl-gcc"

[target.i686-unknown-linux-gnu]
linker = "i686-unknown-linux-gnu-gcc"

[target.i686-unknown-linux-musl]
linker = "i686-unknown-linux-musl-gcc"

[target.armv7-unknown-linux-gnueabihf]
linker = "armv7-unknown-linux-gnueabihf-gcc"

[target.armv7-unknown-linux-musleabihf]
linker = "armv7-unknown-linux-musleabihf-gcc"
rustflags = ["-Clink-arg=-lgcc"]

[target.x86_64-pc-windows-gnu]
linker = "x86_64-w64-mingw32-gcc"
