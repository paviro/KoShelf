name: Release

on:
  push:
    tags: ['[0-9]*.[0-9]*.[0-9]*']
  workflow_dispatch:
    inputs:
      target_group:
        description: Target group to build
        required: true
        default: all
        type: choice
        options:
          - all
          - linux
          - windows
          - macos

permissions:
  contents: read

concurrency:
  group: release-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'workflow_dispatch' }}

env:
  CARGO_TERM_COLOR: always
  CARGO_HTTP_MULTIPLEXING: "false"
  CARGO_NET_RETRY: "10"
  CARGO_NET_GIT_FETCH_WITH_CLI: "true"
  KOSHELF_SKIP_NPM_INSTALL: "1"
  KOSHELF_SKIP_REACT_BUILD: "1"

jobs:
  preflight:
    name: Preflight
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        if: github.event_name == 'push'
        with:
          persist-credentials: false
      - name: Validate release tag
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
        run: |
          if [[ ! "$GITHUB_REF_NAME" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Tag $GITHUB_REF_NAME is not a YEAR.MONTH.PATCH version" >&2
            exit 1
          fi
          version="$(sed -n '/^\[package\]/,/^\[/s/^version = "\([^"]*\)"/\1/p' Cargo.toml)"
          if [ "$version" != "$GITHUB_REF_NAME" ]; then
            echo "Tag $GITHUB_REF_NAME does not match package.version $version" >&2
            exit 1
          fi

  frontend:
    name: Frontend bundle
    needs: preflight
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm --prefix frontend ci
      - run: npm --prefix frontend run lint
      - if: ${{ !cancelled() }}
        run: npm --prefix frontend run format:check
      - if: ${{ !cancelled() }}
        run: npm --prefix frontend run build
      - name: Collect portable frontend build inputs
        run: bash .github/scripts/collect-frontend-build-assets.sh
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: frontend-build
          path: |
            frontend/dist
            frontend/build-assets
          if-no-files-found: error
          retention-days: 1

  linux:
    name: Linux ${{ matrix.platform }}
    needs: [preflight, frontend]
    if: github.event_name == 'push' || inputs.target_group == 'all' || inputs.target_group == 'linux'
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 45
    strategy:
      fail-fast: true
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            platform: linux-gnu-x86_64
            runner: ubuntu-latest
            gnu: true
          - target: aarch64-unknown-linux-gnu
            platform: linux-gnu-aarch64
            runner: ubuntu-latest
            gnu: true
          - target: x86_64-unknown-linux-musl
            platform: linux-musl-x86_64
            runner: ubuntu-latest
            gnu: false
          - target: aarch64-unknown-linux-musl
            platform: linux-musl-aarch64
            runner: ubuntu-24.04-arm
            gnu: false
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: frontend-build
          path: frontend
      - uses: dtolnay/rust-toolchain@2c7215f132e9ebf062739d9130488b56d53c060c # master
        with:
          toolchain: 1.96.0
          targets: ${{ matrix.target }}
      - uses: taiki-e/setup-cross-toolchain-action@12b7ad4acfa95a1476779d6c06699b96ec1691f8 # v1
        if: ${{ !matrix.gnu }}
        with:
          target: ${{ matrix.target }}
      - name: Install Zig 0.16.0
        if: ${{ matrix.gnu }}
        run: |
          archive="$RUNNER_TEMP/zig.tar.xz"
          install_dir="$RUNNER_TEMP/zig"
          curl --fail --location --retry 5 --retry-all-errors \
            --output "$archive" \
            https://ziglang.org/download/0.16.0/zig-x86_64-linux-0.16.0.tar.xz
          echo "70e49664a74374b48b51e6f3fdfbf437f6395d42509050588bd49abe52ba3d00  $archive" | sha256sum --check
          mkdir -p "$install_dir"
          tar -C "$install_dir" --strip-components=1 -xf "$archive"
          echo "$install_dir" >> "$GITHUB_PATH"
          "$install_dir/zig" version
      - uses: taiki-e/install-action@a6b2e2dcd845ddd7f509ce4f3ed3d922b80cc5d9 # v2
        with:
          tool: ${{ matrix.gnu && 'cargo-about@0.9.1,cargo-zigbuild' || 'cargo-about@0.9.1' }}
      - if: ${{ matrix.gnu }}
        run: cargo zigbuild --release --locked --target ${{ matrix.target }}.2.17
        env:
          # LuaJIT's auxiliary executable needs Zig's unwind runtime explicitly.
          TARGET_LIBS: -lunwind
          # The host strip cannot process a cross-compiled executable. This
          # executable is only a build byproduct; KoShelf is verified below.
          TARGET_STRIP: "true"
      - if: ${{ !matrix.gnu }}
        run: cargo build --release --locked
      - name: Verify binary
        run: |
          bin="target/${{ matrix.target }}/release/koshelf"
          file "$bin"
          if ${{ matrix.gnu }}; then
            bad="$(readelf --dyn-syms -W "$bin" | grep -o 'GLIBC_[0-9.]*' | sort -uV \
              | awk -F_ '{ split($2, v, "."); if (v[1] > 2 || (v[1] == 2 && v[2] > 17)) print }')"
            if [ -n "$bad" ]; then
              echo "glibc symbols above 2.17: $bad" >&2
              exit 1
            fi
          elif ! file "$bin" | grep -q 'static'; then
            echo "musl artifact is not statically linked" >&2
            exit 1
          fi
      - name: Package
        run: |
          install -d dist
          (cd "target/${{ matrix.target }}/release" && zip - koshelf) > "dist/${{ matrix.platform }}.zip"
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          path: dist/${{ matrix.platform }}.zip
          if-no-files-found: error
          archive: false
          retention-days: 1

  windows:
    name: Windows ${{ matrix.platform }}
    needs: [preflight, frontend]
    if: github.event_name == 'push' || inputs.target_group == 'all' || inputs.target_group == 'windows'
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 45
    strategy:
      fail-fast: true
      matrix:
        include:
          - target: x86_64-pc-windows-msvc
            platform: windows-msvc-x86_64
            runner: windows-latest
            msvc_arch: x64
          - target: aarch64-pc-windows-msvc
            platform: windows-msvc-aarch64
            runner: windows-11-arm
            msvc_arch: arm64
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: frontend-build
          path: frontend
      - uses: dtolnay/rust-toolchain@2c7215f132e9ebf062739d9130488b56d53c060c # master
        with:
          toolchain: 1.96.0
          targets: ${{ matrix.target }}
      - uses: taiki-e/install-action@a6b2e2dcd845ddd7f509ce4f3ed3d922b80cc5d9 # v2
        with:
          tool: cargo-about@0.9.1
      # LuaJIT's MSVC build script uses this variable to select its ARM64 VM.
      # Native GitHub Windows runners do not enter a Developer Command Prompt.
      - run: cargo build --release --locked --target ${{ matrix.target }}
        env:
          VSCMD_ARG_TGT_ARCH: ${{ matrix.msvc_arch }}
      - name: Package
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Compress-Archive -Path target/${{ matrix.target }}/release/koshelf.exe -DestinationPath dist/${{ matrix.platform }}.zip
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          path: dist/${{ matrix.platform }}.zip
          if-no-files-found: error
          archive: false
          retention-days: 1

  macos:
    name: macOS ${{ matrix.platform }}
    needs: [preflight, frontend]
    if: github.event_name == 'push' || inputs.target_group == 'all' || inputs.target_group == 'macos'
    runs-on: macos-latest
    timeout-minutes: 90
    environment: release
    strategy:
      fail-fast: true
      matrix:
        include:
          - target: x86_64-apple-darwin
            platform: apple-darwin-x86_64
            task: notarize-macos-intel
          - target: aarch64-apple-darwin
            platform: apple-darwin-aarch64
            task: notarize-macos-silicon
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: frontend-build
          path: frontend
      - uses: dtolnay/rust-toolchain@2c7215f132e9ebf062739d9130488b56d53c060c # master
        with:
          toolchain: 1.96.0
          targets: ${{ matrix.target }}
      - name: Import Developer ID certificate
        uses: apple-actions/import-codesign-certs@5142e029c445c10ffc7149d172e540235a065466 # v7.0.0
        with:
          p12-file-base64: ${{ secrets.APPLE_CERT_P12_BASE64 }}
          p12-password: ${{ secrets.APPLE_CERT_PASSWORD }}
      - name: Configure signing and notarization
        env:
          APPLE_DEVELOPER_ID: ${{ secrets.APPLE_DEVELOPER_ID }}
          APPLE_USERNAME: ${{ secrets.APPLE_USERNAME }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
        run: |
          team_id="$(printf '%s' "$APPLE_DEVELOPER_ID" | sed -n 's/.*(\(.*\)).*/\1/p')"
          if [ -z "$team_id" ]; then
            echo "APPLE_DEVELOPER_ID does not contain a Team ID" >&2
            exit 1
          fi
          umask 077
          {
            printf 'APPLE_DEVELOPER_ID="%s"\n' "$APPLE_DEVELOPER_ID"
            printf 'APPLE_NOTARY_PROFILE="koshelf-notary"\n'
          } > ./.env
          xcrun notarytool store-credentials koshelf-notary \
            --apple-id "$APPLE_USERNAME" --password "$APPLE_PASSWORD" --team-id "$team_id" >/dev/null
      - uses: taiki-e/install-action@a6b2e2dcd845ddd7f509ce4f3ed3d922b80cc5d9 # v2
        with:
          tool: cargo-make,cargo-about@0.9.1
      - run: cargo make ${{ matrix.task }}
      - name: Verify signature
        run: codesign --verify --strict --verbose=2 target/${{ matrix.target }}/release/koshelf
      - name: Remove credentials
        if: always()
        run: rm -f ./.env
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          path: release/${{ matrix.platform }}.zip
          if-no-files-found: error
          archive: false
          retention-days: 1

  publish:
    name: Publish release
    needs: [linux, windows, macos]
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: release
    permissions:
      contents: write
      id-token: write
      attestations: write
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: '*.zip'
          path: assets
          merge-multiple: true
          skip-decompress: true
      - name: Validate artifact set
        working-directory: assets
        run: |
          expected="$(printf '%s\n' \
            apple-darwin-aarch64.zip \
            apple-darwin-x86_64.zip \
            linux-gnu-aarch64.zip \
            linux-gnu-x86_64.zip \
            linux-musl-aarch64.zip \
            linux-musl-x86_64.zip \
            windows-msvc-aarch64.zip \
            windows-msvc-x86_64.zip | sort)"
          actual="$(find . -maxdepth 1 -type f -name '*.zip' -print | sed 's#^\./##' | sort)"
          if [ "$actual" != "$expected" ]; then
            echo "Release artifact set does not match the expected files" >&2
            diff <(printf '%s\n' "$expected") <(printf '%s\n' "$actual") || true
            exit 1
          fi
      - name: Generate checksums
        working-directory: assets
        run: sha256sum -- *.zip > SHA256SUMS
      - name: Attest build provenance
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-path: |
            assets/*.zip
            assets/SHA256SUMS
      - name: Publish
        uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228 # v3.0.2
        with:
          tag_name: ${{ github.ref_name }}
          fail_on_unmatched_files: true
          files: |
            assets/*.zip
            assets/SHA256SUMS
