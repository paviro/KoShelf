name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  CARGO_HTTP_MULTIPLEXING: "false"
  CARGO_NET_RETRY: "10"
  CARGO_NET_GIT_FETCH_WITH_CLI: "true"
  KOSHELF_SKIP_NPM_INSTALL: "1"
  KOSHELF_SKIP_REACT_BUILD: "1"
  KOSHELF_SKIP_LICENSE_GENERATION: "1"
  RUSTDOCFLAGS: "-D warnings"

jobs:
  commit-messages:
    name: Commit messages
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
          fetch-depth: 0
      - name: Check commit messages
        env:
          EVENT_NAME: ${{ github.event_name }}
          PUSH_BASE_SHA: ${{ github.event.before }}
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          if [ "$EVENT_NAME" = pull_request ]; then
            base="$PR_BASE_SHA"
            head="$PR_HEAD_SHA"
          else
            base="$PUSH_BASE_SHA"
            head="$GITHUB_SHA"
          fi

          message_file="$(mktemp)"
          trap 'rm -f "$message_file"' EXIT
          while read -r commit; do
            git show --no-patch --format=%B "$commit" > "$message_file"
            if ! .githooks/commit-msg "$message_file"; then
              echo "Invalid subject in commit $commit:" >&2
              git show --no-patch --format='%s' "$commit" >&2
              exit 1
            fi
          done < <(git rev-list --reverse "$base..$head")

  format:
    name: Rust format
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@2c7215f132e9ebf062739d9130488b56d53c060c # master
        with:
          toolchain: 1.96.0
          components: rustfmt
      - run: cargo fmt --all --check

  audit:
    name: Audit
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - uses: taiki-e/install-action@a6b2e2dcd845ddd7f509ce4f3ed3d922b80cc5d9 # v2
        with:
          tool: cargo-audit@0.22.1
      - run: cargo audit --deny warnings

  frontend:
    name: Frontend bundle
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm --prefix frontend ci
      - run: npm --prefix frontend run lint
      - if: ${{ !cancelled() }}
        run: npm --prefix frontend run format:check
      - if: ${{ !cancelled() }}
        run: npm --prefix frontend run build
      - name: Collect portable frontend build inputs
        run: bash .github/scripts/collect-frontend-build-assets.sh
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: frontend-build
          path: |
            frontend/dist
            frontend/build-assets
          if-no-files-found: error
          retention-days: 1

  linux:
    name: Linux (lint · test · docs)
    needs: frontend
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: frontend-build
          path: frontend
      - uses: dtolnay/rust-toolchain@2c7215f132e9ebf062739d9130488b56d53c060c # master
        with:
          toolchain: 1.96.0
          components: clippy
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          save-if: ${{ github.ref == 'refs/heads/main' }}
      - run: cargo clippy --all-targets --locked -- -D warnings
      - run: cargo test --locked
      - run: cargo doc --no-deps --locked

  macos:
    name: macOS (check)
    needs: frontend
    runs-on: macos-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: frontend-build
          path: frontend
      - uses: dtolnay/rust-toolchain@2c7215f132e9ebf062739d9130488b56d53c060c # master
        with:
          toolchain: 1.96.0
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          save-if: ${{ github.ref == 'refs/heads/main' }}
      - run: cargo check --all-targets --locked

  windows:
    name: Windows (check, ${{ matrix.runner }})
    needs: frontend
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 20
    strategy:
      fail-fast: true
      matrix:
        runner: [windows-latest, windows-11-arm]
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: frontend-build
          path: frontend
      - uses: dtolnay/rust-toolchain@2c7215f132e9ebf062739d9130488b56d53c060c # master
        with:
          toolchain: 1.96.0
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          save-if: ${{ github.ref == 'refs/heads/main' }}
      - run: cargo check --all-targets --locked

  cross-check:
    name: Cross-check (${{ matrix.target }})
    needs: frontend
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: true
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
          - target: aarch64-unknown-linux-gnu
          - target: aarch64-unknown-linux-musl
          - target: i686-unknown-linux-gnu
            host_multilib: true
            # GCC 13 ICEs while expanding debug locations in unrar's SSE
            # translation unit. Rust debug info remains enabled.
            cxxflags: -g0
          - target: i686-unknown-linux-musl
            host_multilib: true
          - target: armv7-unknown-linux-gnueabihf
            host_multilib: true
          - target: armv7-unknown-linux-musleabihf
            host_multilib: true
          - target: x86_64-unknown-freebsd
            freebsd_sysroot: true
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: frontend-build
          path: frontend
      - uses: dtolnay/rust-toolchain@2c7215f132e9ebf062739d9130488b56d53c060c # master
        with:
          toolchain: 1.96.0
          targets: ${{ matrix.target }}
      - name: Install 32-bit host compiler
        if: ${{ matrix.host_multilib }}
        run: sudo apt-get update && sudo apt-get install --yes gcc-multilib
      - uses: taiki-e/setup-cross-toolchain-action@12b7ad4acfa95a1476779d6c06699b96ec1691f8 # v1
        if: ${{ !matrix.freebsd_sysroot }}
        with:
          target: ${{ matrix.target }}
      - if: ${{ matrix.freebsd_sysroot }}
        run: sudo apt-get update && sudo apt-get install --yes clang
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          key: ${{ matrix.target }}
          save-if: ${{ github.ref == 'refs/heads/main' }}
      - if: ${{ matrix.freebsd_sysroot }}
        id: freebsd-sysroot
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/freebsd-sysroot
          key: freebsd-sysroot-14.4-RELEASE-v2
      - if: ${{ matrix.freebsd_sysroot && steps.freebsd-sysroot.outputs.cache-hit != 'true' }}
        name: Download FreeBSD sysroot
        run: |
          curl --fail --location --output /tmp/base.txz \
            https://download.freebsd.org/releases/amd64/amd64/14.4-RELEASE/base.txz
          echo "769f60a6eea2938ad6b7943cfbcc17dfaf7d1f7ba59a32b869a00349302df853  /tmp/base.txz" | sha256sum --check
          mkdir -p "$HOME/freebsd-sysroot"
          tar -C "$HOME/freebsd-sysroot" -xf /tmp/base.txz ./lib ./usr/include ./usr/lib
      - if: ${{ matrix.freebsd_sysroot }}
        name: Configure FreeBSD C and C++ compilers
        run: |
          {
            echo "CC_x86_64_unknown_freebsd=clang"
            echo "CXX_x86_64_unknown_freebsd=clang++"
            echo "CFLAGS_x86_64_unknown_freebsd=--sysroot=$HOME/freebsd-sysroot"
            echo "CXXFLAGS_x86_64_unknown_freebsd=--sysroot=$HOME/freebsd-sysroot -stdlib=libc++"
          } >> "$GITHUB_ENV"
      - run: cargo check --target ${{ matrix.target }} --all-targets --locked
        env:
          CXXFLAGS: ${{ matrix.cxxflags }}
